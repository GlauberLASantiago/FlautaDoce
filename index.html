<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flauta Doce - Profa. Isamara Carvalho</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 30%, #4a0082 0%, #1a0033 50%, #05000a 100%);
            color: white;
            position: relative;
        }

        .background-glow {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #ff00ff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 90px 40px, #ffcc00, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #00ffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.6;
            z-index: 0;
            pointer-events: none;
        }

        .main-container {
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1100px;
            padding: 5px;
        }

        .header {
            text-align: center;
            margin-bottom: 5px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
            100% { transform: translateY(0px); }
        }

        .title {
            font-family: 'Anton', sans-serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            line-height: 1;
            white-space: nowrap;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff8b0 0%, #ffd000 40%, #ff8800 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 1.5px #4a00e0;
            filter: drop-shadow(0 0 8px rgba(255, 0, 255, 0.8)) drop-shadow(2px 2px 0px #310066);
            margin-bottom: 2px;
        }

        .subtitle-wrapper {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            pointer-events: none;
            display: inline-block;
            background: linear-gradient(to right, #6200ea, #aa00ff, #6200ea);
            padding: 3px 15px;
            border-radius: 50px;
            border: 2px solid #e0b0ff;
            box-shadow: 0 0 15px rgba(170, 0, 255, 0.6), inset 0 0 8px rgba(255,255,255,0.3);
        }

        .subtitle {
            font-size: clamp(0.7rem, 1.8vw, 0.9rem);
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .recorder-wrapper {
            width: 100%;
            background: #111;
            padding: 8px;
            border-radius: 10px;
            border: 3px solid #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), 0 0 20px rgba(255,0,255,0.3);
            position: relative;
            overflow: hidden;
        }

        .diagram-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            height: clamp(100px, 30vh, 160px);
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0 6px 5px 20px;
            gap: 2px;
            touch-action: manipulation;
            scrollbar-width: thin;
        }

        .note-diagram {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
            margin: 0 3px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            min-width: 44px;
        }

        .note-diagram:hover {
            transform: translateY(-3px);
        }

        .note-diagram.active {
            transform: translateY(2px);
        }

        .note-label {
            font-family: 'Anton', sans-serif;
            font-size: 1rem;
            color: #ffcc00;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 0 0 5px rgba(255,204,0,0.7);
            white-space: nowrap;
        }

        .recorder-visual {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            position: relative;
            padding-left: 8px;
        }

        .hole {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #aaa;
            background: transparent;
            transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
        }

        .hole.closed {
            background: #fff;
            border-color: #fff;
        }

        .hole.thumb {
            position: absolute;
            left: -7px;
            top: 2px;
            border-color: #ff00ff;
        }

        .hole.thumb.closed {
            background: #ff00ff;
            border-color: #ff00ff;
        }

        .hole.thumb.half {
            background: linear-gradient(to right, #ff00ff 50%, transparent 50%);
            border-color: #ff00ff;
        }

        .note-diagram.active .hole.closed {
            background: #00ffff;
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0,255,255,0.8);
        }

        .note-diagram.active .hole.thumb.closed,
        .note-diagram.active .hole.thumb.half {
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255,0,255,0.8);
        }

        .note-diagram.active .hole.thumb.closed {
            background: #ff00ff;
        }

        .note-diagram.active .hole.thumb.half {
            background: linear-gradient(to right, #ff00ff 50%, transparent 50%);
        }

        .note-diagram.active .note-label {
            color: #fff;
            text-shadow: 0 0 10px rgba(0,255,255,0.8);
        }

        .audio-status {
            position: absolute;
            right: 10px;
            bottom: 8px;
            font-size: 0.72rem;
            opacity: 0.75;
            z-index: 30;
        }

        @media (max-width: 700px) {
            .diagram-container {
                justify-content: flex-start;
                gap: 6px;
                padding-left: 24px;
            }

            .subtitle-wrapper {
                top: 64%;
                padding: 3px 10px;
            }

            .note-label {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="main-container">
        <div class="header">
            <h1 class="title">FLAUTA DOCE</h1>
        </div>

        <div class="recorder-wrapper">
            <div class="subtitle-wrapper">
                <span class="subtitle">- Profa. Isamara Carvalho -</span>
            </div>

            <div class="diagram-container" id="recorder-diagrams"></div>
            <div class="audio-status" id="audio-status">toque para ouvir</div>
        </div>
    </div>

    <script>
        const fingeringData = [
            { id: 'C4', label: 'Dó 4', note: 'C4', T: 1, F: '1111111' },
            { id: 'D4', label: 'Ré 4', note: 'D4', T: 1, F: '1111110' },
            { id: 'E4', label: 'Mi 4', note: 'E4', T: 1, F: '1111100' },
            { id: 'F4', label: 'Fá 4', note: 'F4', T: 1, F: '1111011' },
            { id: 'G4', label: 'Sol 4', note: 'G4', T: 1, F: '1110000' },
            { id: 'A4', label: 'Lá 4', note: 'A4', T: 1, F: '1100000' },
            { id: 'B4', label: 'Si 4', note: 'B4', T: 1, F: '1000000' },
            { id: 'C5', label: 'Dó 5', note: 'C5', T: 1, F: '0100000' },
            { id: 'D5', label: 'Ré 5', note: 'D5', T: 0, F: '0100000' },
            { id: 'E5', label: 'Mi 5', note: 'E5', T: 0.5, F: '1111100' },
            { id: 'F5', label: 'Fá 5', note: 'F5', T: 0.5, F: '1111010' },
            { id: 'G5', label: 'Sol 5', note: 'G5', T: 0.5, F: '1110000' },
            { id: 'A5', label: 'Lá 5', note: 'A5', T: 0.5, F: '1100000' },
            { id: 'B5', label: 'Si 5', note: 'B5', T: 0.5, F: '1101100' },
            { id: 'C6', label: 'Dó 6', note: 'C6', T: 0.5, F: '1101000' }
        ];

        const diagramContainer = document.getElementById('recorder-diagrams');
        const statusEl = document.getElementById('audio-status');

        fingeringData.forEach((data) => {
            const noteEl = document.createElement('div');
            noteEl.classList.add('note-diagram');
            noteEl.dataset.note = data.note;

            const labelEl = document.createElement('div');
            labelEl.classList.add('note-label');
            labelEl.innerText = data.label;
            noteEl.appendChild(labelEl);

            const visualEl = document.createElement('div');
            visualEl.classList.add('recorder-visual');

            const thumbHole = document.createElement('div');
            thumbHole.classList.add('hole', 'thumb');
            if (data.T === 1) thumbHole.classList.add('closed');
            else if (data.T === 0.5) thumbHole.classList.add('half');
            visualEl.appendChild(thumbHole);

            for (let i = 0; i < 7; i++) {
                const hole = document.createElement('div');
                hole.classList.add('hole', 'front');
                if (data.F[i] === '1') hole.classList.add('closed');
                visualEl.appendChild(hole);
            }

            noteEl.appendChild(visualEl);
            diagramContainer.appendChild(noteEl);
        });

        let ac = null;
        let instrument = null;
        let currentPlaying = null;
        let isInitializing = false;

        async function initAudio() {
            if (instrument || isInitializing) return;
            isInitializing = true;
            statusEl.textContent = 'carregando áudio...';

            try {
                ac = new (window.AudioContext || window.webkitAudioContext)();

                if (ac.state === 'suspended') {
                    await ac.resume();
                }

                instrument = await Soundfont.instrument(ac, 'recorder');
                statusEl.textContent = 'áudio pronto';
            } catch (err) {
                console.error('Erro no áudio:', err);
                statusEl.textContent = 'áudio bloqueado';
            } finally {
                isInitializing = false;
            }
        }

        async function ensureAudioReady() {
            if (!instrument) {
                await initAudio();
            }

            if (ac && ac.state === 'suspended') {
                await ac.resume();
            }

            return !!instrument;
        }

        function stopAllSounds() {
            if (currentPlaying && typeof currentPlaying.stop === 'function') {
                try {
                    currentPlaying.stop();
                } catch (e) {
                    console.warn('Erro ao parar nota:', e);
                }
            }
            currentPlaying = null;
            document.querySelectorAll('.note-diagram.active').forEach(el => el.classList.remove('active'));
        }
function transposeUp(note) {
    const match = note.match(/^([A-G]#?)(\d)$/);
    if (!match) return note;

    const pitch = match[1];
    const octave = parseInt(match[2]);

    return pitch + (octave + 1);
}
        async function playSound(noteId, diagramEl) {
            const ok = await ensureAudioReady();
            if (!ok) return;

            stopAllSounds();

            const transposedNote = transposeUp(noteId);

currentPlaying = instrument.play(transposedNote, ac.currentTime, {
                gain: 1,
                duration: 1.5
            });

            if (diagramEl) diagramEl.classList.add('active');
            statusEl.textContent = 'tocando';
        }

        function stopSound(diagramEl) {
            stopAllSounds();
            if (diagramEl) diagramEl.classList.remove('active');
            statusEl.textContent = instrument ? 'áudio pronto' : 'toque para ouvir';
        }

        const diagrams = document.querySelectorAll('.note-diagram');

        diagrams.forEach(diag => {
            diag.addEventListener('pointerdown', async (e) => {
                e.preventDefault();
                await playSound(diag.dataset.note, diag);
            });

            diag.addEventListener('pointerup', (e) => {
                e.preventDefault();
                stopSound(diag);
            });

            diag.addEventListener('pointerleave', () => {
                stopSound(diag);
            });

            diag.addEventListener('pointercancel', () => {
                stopSound(diag);
            });
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) stopAllSounds();
        });
    </script>
</body>
</html>
