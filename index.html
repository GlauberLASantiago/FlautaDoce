<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flauta Doce - Profa. Isamara Carvalho</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 30%, #4a0082 0%, #1a0033 50%, #05000a 100%);
            color: white;
            position: relative;
        }

        .background-glow {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #ff00ff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 90px 40px, #ffcc00, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #00ffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.6;
            z-index: 0;
            pointer-events: none;
        }

        .main-container {
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1100px;
            padding: 5px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            animation: float 4s ease-in-out infinite;
        }

        .title-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
            100% { transform: translateY(0px); }
        }

        .title {
            font-family: 'Anton', sans-serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            line-height: 1;
            white-space: nowrap;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff8b0 0%, #ffd000 40%, #ff8800 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 1.5px #4a00e0;
            filter: drop-shadow(0 0 8px rgba(255, 0, 255, 0.8)) drop-shadow(2px 2px 0px #310066);
            margin-bottom: 2px;
        }

        .prof-name {
            font-size: clamp(0.6rem, 1.5vw, 0.85rem);
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(to right, #6200ea, #aa00ff);
            padding: 4px 12px;
            border-radius: 50px;
            border: 1px solid #e0b0ff;
            box-shadow: 0 0 10px rgba(170, 0, 255, 0.6);
            white-space: nowrap;
        }

        .controls-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
            margin-bottom: 15px;
            z-index: 10;
        }

        .instrument-select {
            background: rgba(17, 17, 17, 0.8);
            color: #ffcc00;
            border: 2px solid #aa00ff;
            padding: 8px 35px 8px 15px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            border-radius: 20px;
            outline: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(170, 0, 255, 0.4);
            appearance: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffcc00' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 15px;
            transition: all 0.2s;
        }

        .instrument-select:hover, .instrument-select:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.8);
            color: #fff;
        }

        .control-btn {
            background: rgba(17, 17, 17, 0.8);
            color: #ffcc00;
            border: 2px solid #aa00ff;
            padding: 8px 20px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            border-radius: 20px;
            outline: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(170, 0, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .control-btn:hover, .control-btn:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.8);
            color: #fff;
        }

        /* Estilos do Fader de Reverb */
        .fader-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(17, 17, 17, 0.8);
            border: 2px solid #aa00ff;
            padding: 8px 15px;
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(170, 0, 255, 0.4);
            transition: all 0.2s;
        }

        .fader-container:hover {
            border-color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.8);
        }

        .fader-label {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 90px;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #1a1a1a;
            border-radius: 3px;
            border: 1px solid #6200ea;
        }

        input[type=range]::-webkit-slider-thumb {
            border: 2px solid #ffcc00;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #aa00ff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 0 8px #ff00ff;
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .recorder-wrapper {
            width: 100%;
            background: #111;
            /* Padding inferior aumentado (28px) para o texto de status caber sem brigar com a scrollbar */
            padding: 8px 8px 28px 8px;
            border-radius: 10px;
            border: 3px solid #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), 0 0 20px rgba(255,0,255,0.3);
            position: relative;
            overflow: hidden;
        }

        .diagram-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end; /* Alinha na base para criar o efeito degrau */
            width: 100%;
            height: clamp(140px, 35vh, 200px); /* Aumentado para acomodar o deslocamento */
            overflow-x: auto;
            overflow-y: hidden;
            padding: 40px 6px 15px 20px;
            gap: 2px;
            touch-action: manipulation;
            scrollbar-width: thin;
            scrollbar-color: #aa00ff #1a1a1a;
        }

        /* Estilização da barra de rolagem (Webkit) */
        .diagram-container::-webkit-scrollbar {
            height: 8px;
        }
        .diagram-container::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 4px;
        }
        .diagram-container::-webkit-scrollbar-thumb {
            background: #6200ea;
            border-radius: 4px;
        }
        .diagram-container::-webkit-scrollbar-thumb:hover {
            background: #aa00ff;
        }

        .note-diagram {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
            margin: 0 3px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            min-width: 44px;
            transform: translateY(0px); /* Posição base notas diatonicas */
        }

        .note-diagram:hover {
            transform: translateY(-3px);
        }

        .note-diagram.active {
            transform: translateY(2px);
        }

        /* Classes específicas para as Notas Cromáticas (sustenidos) */
        .note-diagram.chromatic {
            transform: translateY(-30px);
            z-index: 2; /* Sobrepor vizinhos se necessário */
        }

        .note-diagram.chromatic:hover {
            transform: translateY(-33px);
        }

        .note-diagram.chromatic.active {
            transform: translateY(-28px);
        }

        .note-label {
            font-family: 'Anton', sans-serif;
            font-size: 1rem;
            color: #ffcc00;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 0 0 5px rgba(255,204,0,0.7);
            white-space: nowrap;
            transition: opacity 0.3s ease;
        }

        .hide-labels .note-label {
            opacity: 0;
            pointer-events: none;
        }

        .note-diagram.chromatic .note-label {
            color: #ff99ff;
            font-size: 0.9rem;
            text-shadow: 0 0 5px rgba(255,153,255,0.7);
        }

        .recorder-visual {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            position: relative;
            padding-left: 8px;
        }

        .hole {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #aaa;
            background: transparent;
            transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
        }

        .hole.closed {
            background: #fff;
            border-color: #fff;
        }

        .hole.front.half {
            background: linear-gradient(to right, #fff 50%, transparent 50%);
            border-color: #fff;
        }

        .hole.thumb {
            position: absolute;
            left: -7px;
            top: 2px;
            border-color: #ff00ff;
        }

        .hole.thumb.closed {
            background: #ff00ff;
            border-color: #ff00ff;
        }

        .hole.thumb.half {
            background: linear-gradient(to right, #ff00ff 50%, transparent 50%);
            border-color: #ff00ff;
        }

        .note-diagram.active .hole.closed {
            background: #00ffff;
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0,255,255,0.8);
        }
        
        .note-diagram.active .hole.front.half {
            background: linear-gradient(to right, #00ffff 50%, transparent 50%);
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0,255,255,0.8);
        }

        .note-diagram.active .hole.thumb.closed,
        .note-diagram.active .hole.thumb.half {
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255,0,255,0.8);
        }

        .note-diagram.active .hole.thumb.closed {
            background: #ff00ff;
        }

        .note-diagram.active .hole.thumb.half {
            background: linear-gradient(to right, #ff00ff 50%, transparent 50%);
        }

        .note-diagram.active .note-label {
            color: #fff;
            text-shadow: 0 0 10px rgba(0,255,255,0.8);
        }

        .audio-status {
            position: absolute;
            right: 15px;
            bottom: 6px;
            font-size: 0.72rem;
            opacity: 0.75;
            z-index: 30;
        }

        @media (max-width: 700px) {
            .diagram-container {
                justify-content: flex-start;
                gap: 6px;
                padding-left: 24px;
                height: clamp(140px, 35vh, 180px);
                padding-top: 35px;
            }

            .note-diagram.chromatic {
                transform: translateY(-20px);
            }

            .note-diagram.chromatic:hover {
                transform: translateY(-23px);
            }

            .note-diagram.chromatic.active {
                transform: translateY(-18px);
            }

            .note-label {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="main-container">
        <div class="header">
            <div class="title-group">
                <h1 class="title">FLAUTA DOCE</h1>
                <span class="prof-name">Profa. Isamara Carvalho</span>
            </div>
        </div>

        <div class="controls-wrapper">
            <select id="instrument-select" class="instrument-select">
                <option value="soprano">Soprano</option>
                <option value="alto">Contralto</option>
                <option value="tenor">Tenor</option>
            </select>
            <button id="toggle-labels-btn" class="control-btn">Ocultar Notas</button>
            
            <div class="fader-container">
                <label for="reverb-fader" class="fader-label">Reverb</label>
                <input type="range" id="reverb-fader" min="0" max="1" step="0.01" value="0.35">
            </div>
        </div>

        <div class="recorder-wrapper">
            <div class="diagram-container" id="recorder-diagrams"></div>
            <div class="audio-status" id="audio-status">toque para ouvir</div>
        </div>
    </div>

    <script>
        // Array de dedilhados relativos base (0 = nota mais grave da flauta, todos furos fechados)
        const baseFingerings = [
            { T: 1, F: '1111111', c: false }, // 0
            { T: 1, F: '111111H', c: true },  // 1
            { T: 1, F: '1111110', c: false }, // 2
            { T: 1, F: '11111H0', c: true },  // 3
            { T: 1, F: '1111100', c: false }, // 4
            { T: 1, F: '1111011', c: false }, // 5 
            { T: 1, F: '1111010', c: true },  // 6 
            { T: 1, F: '1110000', c: false }, // 7 
            { T: 1, F: '1110110', c: true },  // 8 
            { T: 1, F: '1100000', c: false }, // 9 
            { T: 1, F: '1011000', c: true },  // 10 
            { T: 1, F: '1000000', c: false }, // 11 
            { T: 1, F: '0100000', c: false }, // 12 (Oitava)
            { T: 0, F: '1100000', c: true },  // 13 
            { T: 0, F: '0100000', c: false }, // 14 
            { T: 0, F: '0111110', c: true },  // 15 
            { T: 0.5, F: '1111100', c: false }, // 16 
            { T: 0.5, F: '1111010', c: false }, // 17 
            { T: 0.5, F: '1110100', c: true },  // 18 
            { T: 0.5, F: '1110000', c: false }, // 19 
            { T: 0.5, F: '1110110', c: true },  // 20 
            { T: 0.5, F: '1100000', c: false }, // 21 
            { T: 0.5, F: '1101100', c: true },  // 22 
            { T: 0.5, F: '1100100', c: false }, // 23 
            { T: 0.5, F: '1101000', c: false }  // 24 
        ];

        const noteNamesBr = ['Dó', 'Dó#', 'Ré', 'Ré#', 'Mi', 'Fá', 'Fá#', 'Sol', 'Sol#', 'Lá', 'Lá#', 'Si'];
        const noteNamesEn = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

        // Configurações de transposição para gerar nomes e oitavas de reprodução de acordo com o instrumento
        const instrumentsConfig = {
            soprano: { 
                startNoteIndex: 0, // Inicia no Dó
                startOctave: 4,    // Dó 4 visualmente
                playbackOctaveOffset: 1 // Soa uma oitava acima (Dó 5)
            },
            alto: { 
                startNoteIndex: 5, // Inicia no Fá
                startOctave: 4,    // Fá 4 visualmente
                playbackOctaveOffset: 0 // Soa no tom exato (Fá 4)
            },
            tenor: { 
                startNoteIndex: 0, // Inicia no Dó
                startOctave: 3,    // Dó 3 visualmente
                playbackOctaveOffset: 1 // Soa na oitava Dó 4
            }
        };

        const diagramContainer = document.getElementById('recorder-diagrams');
        const statusEl = document.getElementById('audio-status');
        const instrumentSelect = document.getElementById('instrument-select');
        const toggleLabelsBtn = document.getElementById('toggle-labels-btn');
        const reverbFader = document.getElementById('reverb-fader');

        let ac = null;
        let instrument = null;
        let currentPlaying = null;
        let isInitializing = false;

        // Nós de Áudio para o Reverb
        let inputNode = null;
        let reverbGainNode = null;

        function renderFlute(instrumentKey) {
            stopAllSounds();
            diagramContainer.innerHTML = ''; 
            const config = instrumentsConfig[instrumentKey];

            baseFingerings.forEach((data, index) => {
                // Cálculo matemático perfeito para transpor escalas
                const noteIndex = (config.startNoteIndex + index) % 12;
                const octaveShift = Math.floor((config.startNoteIndex + index) / 12);
                
                const writtenOctave = config.startOctave + octaveShift;
                const playbackOctave = writtenOctave + config.playbackOctaveOffset;

                const labelText = `${noteNamesBr[noteIndex]} ${writtenOctave}`;
                const playbackNote = `${noteNamesEn[noteIndex]}${playbackOctave}`;

                const noteEl = document.createElement('div');
                noteEl.classList.add('note-diagram');
                if (data.c) noteEl.classList.add('chromatic');
                noteEl.dataset.note = playbackNote;

                const labelEl = document.createElement('div');
                labelEl.classList.add('note-label');
                labelEl.innerText = labelText;
                noteEl.appendChild(labelEl);

                const visualEl = document.createElement('div');
                visualEl.classList.add('recorder-visual');

                const thumbHole = document.createElement('div');
                thumbHole.classList.add('hole', 'thumb');
                if (data.T === 1) thumbHole.classList.add('closed');
                else if (data.T === 0.5) thumbHole.classList.add('half');
                visualEl.appendChild(thumbHole);

                for (let i = 0; i < 7; i++) {
                    const hole = document.createElement('div');
                    hole.classList.add('hole', 'front');
                    if (data.F[i] === '1') {
                        hole.classList.add('closed');
                    } else if (data.F[i] === 'H') {
                        hole.classList.add('half');
                    }
                    visualEl.appendChild(hole);
                }

                noteEl.appendChild(visualEl);
                diagramContainer.appendChild(noteEl);

                // Eventos de Toque
                noteEl.addEventListener('pointerdown', async (e) => {
                    e.preventDefault();
                    await playSound(playbackNote, noteEl);
                });

                noteEl.addEventListener('pointerup', (e) => {
                    e.preventDefault();
                    stopSound(noteEl);
                });

                noteEl.addEventListener('pointerleave', () => {
                    stopSound(noteEl);
                });

                noteEl.addEventListener('pointercancel', () => {
                    stopSound(noteEl);
                });
            });
        }

        // Função para criar uma resposta a impulsos sintética (simula o som a ressaltar numa sala)
        function createReverbBuffer(audioContext, duration, decay) {
            const sampleRate = audioContext.sampleRate;
            const length = sampleRate * duration;
            const impulse = audioContext.createBuffer(2, length, sampleRate);
            const impulseL = impulse.getChannelData(0);
            const impulseR = impulse.getChannelData(1);

            for (let i = 0; i < length; i++) {
                const n = i === 0 ? 1 : i;
                impulseL[i] = (Math.random() * 2 - 1) * Math.pow(1 - n / length, decay);
                impulseR[i] = (Math.random() * 2 - 1) * Math.pow(1 - n / length, decay);
            }
            return impulse;
        }

        async function initAudio() {
            if (instrument || isInitializing) return;
            isInitializing = true;
            statusEl.textContent = 'a carregar áudio...';

            try {
                ac = new (window.AudioContext || window.webkitAudioContext)();

                if (ac.state === 'suspended') {
                    await ac.resume();
                }

                // Configurar o roteamento de áudio com Reverb
                if (!inputNode) {
                    inputNode = ac.createGain();
                    const reverbNode = ac.createConvolver();
                    reverbGainNode = ac.createGain();
                    const dryGainNode = ac.createGain();

                    // Gerar o Reverb
                    reverbNode.buffer = createReverbBuffer(ac, 2.5, 2.0);

                    // Ligações: Input -> [Dry, Reverb] -> Destination
                    inputNode.connect(dryGainNode);
                    inputNode.connect(reverbNode);
                    reverbNode.connect(reverbGainNode);
                    dryGainNode.connect(ac.destination);
                    reverbGainNode.connect(ac.destination);

                    dryGainNode.gain.value = 1.0;
                    reverbGainNode.gain.value = parseFloat(reverbFader.value);
                }

                instrument = await Soundfont.instrument(ac, 'recorder');
                statusEl.textContent = 'áudio pronto';
            } catch (err) {
                console.error('Erro no áudio:', err);
                statusEl.textContent = 'áudio bloqueado';
            } finally {
                isInitializing = false;
            }
        }

        async function ensureAudioReady() {
            if (!instrument) {
                await initAudio();
            }
            if (ac && ac.state === 'suspended') {
                await ac.resume();
            }
            return !!instrument;
        }

        function stopAllSounds() {
            if (currentPlaying && typeof currentPlaying.stop === 'function') {
                try {
                    currentPlaying.stop();
                } catch (e) {
                    console.warn('Erro ao parar nota:', e);
                }
            }
            currentPlaying = null;
            document.querySelectorAll('.note-diagram.active').forEach(el => el.classList.remove('active'));
        }

        async function playSound(playbackNote, diagramEl) {
            const ok = await ensureAudioReady();
            if (!ok) return;

            stopAllSounds();

            currentPlaying = instrument.play(playbackNote, ac.currentTime, {
                gain: 1,
                duration: 1.5,
                destination: inputNode // O som vai passar pelo nosso sistema de reverb
            });

            if (diagramEl) diagramEl.classList.add('active');
            statusEl.textContent = 'a tocar';
        }

        function stopSound(diagramEl) {
            stopAllSounds();
            if (diagramEl) diagramEl.classList.remove('active');
            statusEl.textContent = instrument ? 'áudio pronto' : 'toque para ouvir';
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) stopAllSounds();
        });

        instrumentSelect.addEventListener('change', (e) => {
            renderFlute(e.target.value);
        });

        reverbFader.addEventListener('input', (e) => {
            if (reverbGainNode) {
                reverbGainNode.gain.value = parseFloat(e.target.value);
            }
        });

        let labelsVisible = true;
        toggleLabelsBtn.addEventListener('click', () => {
            labelsVisible = !labelsVisible;
            if (labelsVisible) {
                diagramContainer.classList.remove('hide-labels');
                toggleLabelsBtn.textContent = 'Ocultar Notas';
            } else {
                diagramContainer.classList.add('hide-labels');
                toggleLabelsBtn.textContent = 'Mostrar Notas';
            }
        });

        // Inicializa com Soprano
        renderFlute('soprano');
    </script>
</body>
</html>
